workflows:
  ios-workflow:
    name: iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Clean previous build artifacts
        script: |
          flutter clean
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build Unsigned IPA
        script: |
          # 1. Generate Flutter build files without building (avoids code signing check)
          flutter build ios --release --no-codesign --config-only

          # 2. Build with xcodebuild directly, fully disabling code signing
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            BUILD_DIR="../build/ios" \
            clean build 2>&1 | tee /tmp/xcode_build.log | tail -30
          cd ..

          # Show actual errors (not just notes)
          echo "=== XCODEBUILD ERRORS ==="
          grep -i "error:" /tmp/xcode_build.log | grep -v "note:" | tail -30
          echo "=== SCRIPT PHASE OUTPUT ==="
          grep -A5 "PhaseScriptExecution\|xcode_backend\|FLUTTER_ROOT\|error:" /tmp/xcode_build.log | grep -v "note: Disabling" | tail -40

          # 3. Locate the .app bundle
          APP_PATH="build/ios/Release-iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found at $APP_PATH"
            echo "Searching for .app bundles:"
            find build -name "*.app" -type d 2>/dev/null
            ls -R build/ios/ 2>/dev/null | head -40
            exit 1
          fi

          # 4. Verify the executable exists
          if [ ! -f "$APP_PATH/Runner" ]; then
            echo "ERROR: Runner executable not found inside app bundle"
            ls -la "$APP_PATH"
            exit 1
          fi

          echo "App bundle OK:"
          ls -la "$APP_PATH/Runner"

          # 5. Ad-hoc sign for AltStore/Sideloadly compatibility
          echo "Ad-hoc signing..."
          find "$APP_PATH/Frameworks" -name "*.framework" -type d | while read framework; do
            /usr/bin/codesign --force --deep --sign - "$framework"
          done
          /usr/bin/codesign --force --deep --sign - "$APP_PATH"
          echo "Ad-hoc signing complete"

          # 6. Package into IPA
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -y Runner.ipa Payload

          echo "IPA contents:"
          unzip -l Runner.ipa | head -20

          mv Runner.ipa $CM_BUILD_DIR/Runner.ipa
    artifacts:
      - Runner.ipa