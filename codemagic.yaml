workflows:
  ios-workflow:
    name: iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Clean previous build artifacts
        script: |
          flutter clean
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build Unsigned IPA
        script: |
          # 1. Build iOS app with Flutter (no code signing)
          flutter build ios --release --no-codesign

          # 2. Locate the .app bundle
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH="build/ios/Release-iphoneos/Runner.app"
          fi
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found"
            find build -name "*.app" -type d 2>/dev/null
            exit 1
          fi

          # 3. Verify the executable exists
          if [ ! -f "$APP_PATH/Runner" ]; then
            echo "ERROR: Runner executable not found inside app bundle"
            ls -la "$APP_PATH"
            exit 1
          fi

          echo "App bundle OK:"
          ls -la "$APP_PATH/Runner"

          # 4. Ad-hoc sign for AltStore/Sideloadly compatibility
          echo "Ad-hoc signing..."
          find "$APP_PATH/Frameworks" -name "*.framework" -type d | while read framework; do
            /usr/bin/codesign --force --deep --sign - "$framework"
          done
          /usr/bin/codesign --force --deep --sign - "$APP_PATH"
          echo "Ad-hoc signing complete"

          # 5. Package into IPA
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -y Runner.ipa Payload

          echo "IPA contents:"
          unzip -l Runner.ipa | head -20

          mv Runner.ipa $CM_BUILD_DIR/Runner.ipa
    artifacts:
      - Runner.ipa