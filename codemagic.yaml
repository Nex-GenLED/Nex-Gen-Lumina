workflows:
  ios-workflow:
    name: iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Clean previous build artifacts
        script: |
          flutter clean
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build Unsigned IPA
        script: |
          # 1. Build the iOS app (let errors surface — no || true)
          flutter build ios --release --no-codesign --verbose 2>&1 | tail -80

          # 2. Locate the .app bundle
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Not found at $APP_PATH, checking Release path..."
            APP_PATH="build/ios/Release-iphoneos/Runner.app"
          fi

          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found. Searching for .app bundles:"
            find build -name "*.app" -type d 2>/dev/null
            echo "--- Build directory listing ---"
            ls -R build/ios/ 2>/dev/null | head -40
            exit 1
          fi

          # 3. Verify the executable exists inside the bundle
          if [ ! -f "$APP_PATH/Runner" ]; then
            echo "ERROR: Runner executable not found inside app bundle"
            echo "Bundle contents:"
            ls -la "$APP_PATH"
            exit 1
          fi

          echo "App bundle found with contents:"
          ls -la "$APP_PATH"

          # 4. Ad-hoc sign all binaries for AltStore/Sideloadly compatibility
          echo "Ad-hoc signing app bundle..."
          /usr/bin/codesign --force --deep --sign - "$APP_PATH"

          find "$APP_PATH/Frameworks" -name "*.framework" -type d | while read framework; do
            echo "Signing framework: $framework"
            /usr/bin/codesign --force --deep --sign - "$framework"
          done
          echo "Ad-hoc signing complete"

          # 5. Package into IPA
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -y Runner.ipa Payload

          echo "IPA contents:"
          unzip -l Runner.ipa | head -20

          mv Runner.ipa $CM_BUILD_DIR/Runner.ipa
    artifacts:
      - Runner.ipa