workflows:
  ios-workflow:
    name: iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: NexGen
    environment:
      flutter: stable
      xcode: 16.2
      cocoapods: default
      vars:
        BUNDLE_ID: com.nexgenled.command
    scripts:
      - name: Clear CocoaPods cache
        script: |
          rm -rf ~/Library/Caches/CocoaPods
          rm -rf ios/Pods
          rm -rf ios/.symlinks
          rm -f ios/Podfile.lock
      - name: Clear Flutter cache
        script: |
          flutter clean
          rm -rf .dart_tool
          rm -rf build
          flutter pub cache repair
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Set build number
        script: |
          BUILD_NUM=${PROJECT_BUILD_NUMBER:-$(date +%s)}
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          sed -i '' "s/^version: .*/version: ${VERSION_NAME}+${BUILD_NUM}/" pubspec.yaml
          echo "Version: $(grep '^version:' pubspec.yaml)"
      - name: Create provisioning profile
        script: |
          app-store-connect fetch-signing-files \
            com.nexgenled.command \
            --type IOS_APP_STORE \
            --create \
            --save
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
