workflows:
  ios-workflow:
    name: iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: NexGen
    environment:
      flutter: stable
      xcode: 16.2
      cocoapods: default
      groups:
        - ios-workflow
      vars:
        BUNDLE_ID: com.nexgenled.command
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing settings
        script: xcode-project use-profiles
      - name: Set build number
        script: |
          BUILD_NUM=${PROJECT_BUILD_NUMBER:-$(date +%s)}
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          sed -i '' "s/^version: .*/version: ${VERSION_NAME}+${BUILD_NUM}/" pubspec.yaml
          echo "Version: $(grep '^version:' pubspec.yaml)"
      - name: Install CocoaPods
        script: |
          flutter pub get
          cd ios && pod install --repo-update
      - name: Build IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
