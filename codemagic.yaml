workflows:
  ios-workflow:
    name: iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: NexGen
    environment:
      flutter: stable
      xcode: 16.2
      cocoapods: default
      vars:
        BUNDLE_ID: com.nexgenled.command
    scripts:
      - name: Clear CocoaPods cache
        script: |
          rm -rf ~/Library/Caches/CocoaPods
          rm -rf ios/Pods
          rm -rf ios/.symlinks
          rm -f ios/Podfile.lock
      - name: Clear Flutter cache
        script: |
          flutter clean
          rm -rf .dart_tool
          rm -rf build
          flutter pub cache repair
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Set build number
        script: |
          BUILD_NUM=${PROJECT_BUILD_NUMBER:-$(date +%s)}
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          sed -i '' "s/^version: .*/version: ${VERSION_NAME}+${BUILD_NUM}/" pubspec.yaml
          echo "Version: $(grep '^version:' pubspec.yaml)"
      - name: Create provisioning profile
        script: |
          app-store-connect fetch-signing-files \
            com.nexgenled.command \
            --type IOS_APP_STORE \
            --create \
            --save
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Create ExportOptions.plist
        script: |
          cat > ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>K337ZPY37S</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nexgenled.command</key>
              <string>Lumina AppStore 2</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
      - name: Build signed IPA
        script: |
          flutter build ipa --release || true

          # If flutter build ipa didn't produce the IPA,
          # export manually from the archive
          if [ ! -f "build/ios/ipa/Runner.ipa" ]; then
            echo "Flutter IPA export failed, exporting manually..."
            keychain add-certificates
            xcodebuild -exportArchive \
              -archivePath build/ios/archive/Runner.xcarchive \
              -exportPath build/ios/ipa \
              -exportOptionsPlist ios/ExportOptions.plist \
              -allowProvisioningUpdates
          fi
      - name: Find IPA location
        script: |
          echo "Searching for IPA files..."
          find . -name "*.ipa" -type f 2>/dev/null
          echo "build/ios contents:"
          ls -la build/ios/ 2>/dev/null || echo "build/ios not found"
          echo "build/ios/ipa contents:"
          ls -la build/ios/ipa/ 2>/dev/null || echo "build/ios/ipa not found"
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
